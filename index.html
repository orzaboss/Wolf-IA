<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WOLF AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <img src="7EC67855-56FA-4996-B16E-774362B3EF8B.png" alt="Wolf AI Logo" class="logo"/>
        <div class="logo-text">WOLF AI</div>
      </div>
      <button class="login-btn">Login</button>
    </header>

    <nav>
      <a href="#">Inicio</a> | <a href="#">Contáctanos</a>
    </nav>

    <div class="chat-container" id="chatBox">
      <div class="message-container">
        <div class="avatar">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#5b1400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10A10.011 10.011 0 0 0 12 2Zm0 3a3 3 0 1 1-3 3 3 3 0 0 1 3-3Zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-2 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22Z"/>
          </svg>
        </div>
        <div class="message bot-message">
          ¡Hola! Soy WolfAI 🧠 ¿En qué puedo ayudarte hoy?
        </div>
      </div>
    </div>

    <div class="input-container">
      <input type="text" class="message-input" id="userInput" placeholder="Escribe tu mensaje..."/>
      <button class="send-btn" id="sendBtn">
        <svg class="send-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </button>
    </div>
  </div>
</body>
</html>
